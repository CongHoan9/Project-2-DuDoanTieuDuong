services:
  - type: web
    name: diabetes-prediction-app
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false
